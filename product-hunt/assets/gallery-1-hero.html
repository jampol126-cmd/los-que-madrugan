<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1270px;
      height: 760px;
      background: linear-gradient(135deg, #0B0F17 0%, #1a2332 50%, #0B0F17 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 60px;
    }
    .emoji {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 56px;
      color: white;
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    h1 span {
      color: #F59E0B;
    }
    .subtitle {
      font-size: 28px;
      color: #94A3B8;
      margin-bottom: 40px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #F59E0B, #D97706);
      color: #0B0F17;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 30px;
    }
    .features {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-top: 40px;
    }
    .feature {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 30px;
      color: white;
      font-size: 16px;
    }
    .feature strong {
      color: #F59E0B;
      display: block;
      font-size: 20px;
      margin-bottom: 5px;
    }
    .sun {
      position: absolute;
      top: 60px;
      right: 100px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, #FCD34D 0%, #F59E0B 70%);
      border-radius: 50%;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="sun"></div>
  <div class="container">
    <div class="emoji">🌅</div>
    <h1>Frases motivacionales<br>a las <span>6:00 AM</span></h1>
    <p class="subtitle">Para emprendedores que abren su negocio<br>mientras el mundo duerme. Sin humo, solo compañía real.</p>
    <div class="badge">3 días GRATIS</div>
    <div class="features">
      <div class="feature">
        <strong>$9.900</strong>
        COP/mes
      </div>
      <div class="feature">
        <strong>500+</strong>
        emprendedores
      </div>
      <div class="feature">
        <strong>4.9 ★</strong>
        rating
      </div>
    </div>
  </div>
</body>
</html>
